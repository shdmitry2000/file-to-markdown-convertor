services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./tests/files_to_convert:/home/appuser/app/files_to_convert
      - ./tests/converted_files:/home/appuser/app/converted_files
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    volumes:               
      - ./tests/files_to_convert:/home/appuser/app/files_to_convert
      - ./tests/converted_files:/home/appuser/app/converted_files
    command: python workers/worker.py --host api
    deploy:
      replicas: 4 # Adjust the number of workers based on your CPU cores
    depends_on:
      - api
    restart: on-failure

networks:
  default:
    name: file-converter-network
    